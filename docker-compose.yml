services:
  jrvltsql:
    build: .
    image: jrvltsql:wine
    environment:
      DISPLAY: ":1"
      WINEPREFIX: /wineprefix
      WINEARCH: win64
      JVLINK_WINEPREFIX: /wineprefix
      JVLINK_WINEARCH: win64
      JVLINK_BRIDGE_EXE: /app/tools/jvlink-bridge/bin/native/JVLinkBridge.exe
      AUTO_INSTALL_JVLINK: ${AUTO_INSTALL_JVLINK:-1}
      JVLINK_INSTALLERS_DIR: /installers
      JVLINK_INSTALLER: ${JVLINK_INSTALLER:-}
      JVLINK_INSTALLER_ARGS: ${JVLINK_INSTALLER_ARGS:-}
      JVLINK_DLL: ${JVLINK_DLL:-}
      NOVNC_PUBLIC_PORT: 6080
      VNC_PUBLIC_PORT: 15900
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DATABASE: ${POSTGRES_DATABASE:-keiba}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "6080:6080"  # noVNC browser UI
      - "15900:5900" # raw VNC
    volumes:
      - ./config:/app/config
      - ./data:/app/data
      - ./logs:/app/logs
      - ./wineprefix:/wineprefix
      - ./jvlink-installers:/installers:ro
    shm_size: "1gb"
    depends_on:
      - postgres
    command: ["sleep", "infinity"]

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DATABASE:-keiba}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
